      #     ./assets/check_cgmlst.sh > cgmlst_scan_report.txt 2>&1

      #     NEW_COUNT=$(grep -c '^https://www.cgmlst.org/ncs/schema/' cgmlst_scan_report.txt || echo "unknown")
      #     echo "CGMLST_FOUND=$NEW_COUNT" >> $GITHUB_ENV

      #     if grep -q "CHANGES DETECTED" cgmlst_scan_report.txt; then
      #       echo "CGMLST_DISCREPANCY=true" >> $GITHUB_ENV
      #       echo "CGMLST_REPORT<<EOF" >> $GITHUB_ENV
      #       cat cgmlst_scan_report.txt >> $GITHUB_ENV
      #       echo "EOF" >> $GITHUB_ENV
      #     else
      #       echo "CGMLST_DISCREPANCY=false" >> $GITHUB_ENV
      #       echo "CGMLST_REPORT=No changes detected in cgMLST schemes." >> $GITHUB_ENV
      #     fi

         # ── Compute cgMLST count for badge ─────────────────────────
      # - name: Compute cgMLST scheme count
      #   id: cgmlst_count
      #   run: |
      #     # Use the baseline file count (most accurate for "tracked")
      #     COUNT=$(wc -l < ./assets/cgmlst_schemes.txt | xargs)
      #     # Or use the just-fetched count if you prefer live value:
      #     # COUNT=$(grep -c '^https://www.cgmlst.org/ncs/schema/' cgmlst_scan_report.txt || echo "error")
      #     echo "CGMLST_COUNT=$COUNT" >> $GITHUB_ENV

      # ── Update cgMLST Badge ──────────────────────────────────────────────────
      # - name: Update cgMLST Schemes Badge
      #   uses: schneegans/dynamic-badges-action@v1.7.0
      #   with:
      #     auth: ${{ secrets.GIST_TOKEN }}
      #     gistID: ${{ secrets.GIST_ID_CGMLST }}
      #     filename: cgmlst_schemes.json
      #     label: cgMLST Schemes
      #     message: ${{ env.CGMLST_COUNT }}
      #     color: "ffffff"
      #     labelColor: "000000"

      # ── Send Consolidated Email ─────────────────────────────────────
      - name: Send Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Schemes Monitor] PubMLST & cgMLST Weekly Check - ${{ github.run_number }}"
          to: marian.freisleben@liora-bioinformatics.com
          from: GitHub Actions Monitor <${{ secrets.MAIL_USERNAME }}>
          body: |
            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Trigger: ${{ github.event_name == 'schedule' && 'Scheduled (weekly)' || 'Manual' }}

            ┌──────────────────────────────┐
            │ PubMLST Results              │
            └──────────────────────────────┘
            Tracked schemes: ${{ env.TRACKED_COUNT  }}
            ${{ env.REPORT_BODY }}

            

            Full logs: See the workflow run link above.
          content_type: text/plain

      # ── Cleanup temporary files ──────────────────────────────────────────────
      - name: Cleanup temporary files
        if: always()
        run: |
          rm -f ./assets/removed_pubmlst.txt ./assets/updated_pubmlst.txt ./assets/fetch_pubmlst.txt