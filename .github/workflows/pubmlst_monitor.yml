name: Scheme Update Monitor

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo pip install pubmlstdownload
          

      # ── PubMLST Check ────────────────────────────────────────────────────────
      - name: Run PubMLST Scan
        id: pubmlst_scan
        run: |
          chmod +x ./bin/check_pubmlst.sh
          ./bin/check_pubmlst.sh

          TRACKED_COUNT=$(tail -n +2 ./assets/pubmlst_schemes.csv | wc -l)
          echo "TRACKED_COUNT=$TRACKED_COUNT" >> $GITHUB_ENV

          # Initialize an empty report body
          echo "REPORT_BODY<<EOF" >> $GITHUB_ENV
          
          if grep -q '[^[:space:]]' ./assets/updated_pubmlst.txt; then
            echo "New/Updated schemes found:" >> $GITHUB_ENV
            cat ./assets/updated_pubmlst.txt >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
          fi

          if grep -q '[^[:space:]]' ./assets/removed_pubmlst.txt; then
            echo "Schemes removed from PubMLST:" >> $GITHUB_ENV
            cat ./assets/removed_pubmlst.txt >> $GITHUB_ENV
          fi
          
          echo "EOF" >> $GITHUB_ENV

      # ── Update PubMLST Badge ─────────────────────────────────────
      - name: Update Tracked Count Badge (PubMLST)
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: pubmlst_schemes.json
          label: PubMLST Schemes
          message: ${{ env.TRACKED_COUNT  }}
          color: "ffffff"
          labelColor: "002147"

      # ── cgMLST Check ─────────────────────────────────────────────────────────
